<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>prod-us test</title>

  <script type="module" src="../index.js"></script>
  <script src="//api.glia.com/salemove_integration.js"></script>

  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="content">
    <h1>Prod US</h1>

    <section>
      <h2>Inputs for testing Cobra</h2>
      <form>
        <div class="field">
          <label for="normal">Normal</label>
          <input type="text" id="normal" name="normal" value="">
        </div>
        <div class="field">
          <label for="disabled">Disabled</label>
          <input type="text" id="disabled" class="sm_cobrowsing_disabled_field" name="disabled" value="">
        </div>
        <div class="field">
          <label for="masked">Masked</label>
          <input type="text" id="masked" class="sm_cobrowsing_masked_field" name="masked" value="">
        </div>
        <div class="field">
          <label for="masked2">Masked and disabled by parent</label>
          <div class="sm_cobrowsing_masked_field sm_cobrowsing_disabled_field row">
            <div>
              <input type="text" id="masked2" class="sm_cobrowsing_disabled_field" value="">
            </div>
          </div>
        </div>
      </form>
    </section>

    <section>
      <h2>Update visitor information</h2>
      <textarea id="updateInformation"></textarea>
      <div class="button-row">
        <button class="primary" onclick="onUpdateInformation('replace', this)">Replace</button>
        <button onclick="onUpdateInformation('merge', this)">Merge</button>
      </div>
    </section>

  </main>
</body>
</html>
