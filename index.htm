<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sviik test pages</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .index-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .index-list li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: background 0.12s;
    }
    .index-list li a:hover {
      background: var(--bg);
      color: var(--accent);
    }
    .index-list li a .arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }
    .index-list li a .tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Test pages</h1>
    <section>
      <h2>Tools</h2>
      <ul class="index-list">
        <li>
          <a href="omnibrowse/">
            OmniBrowse Launcher
            <span class="tag">omnibrowse</span>
            <span class="arrow">→</span>
          </a>
        </li>
      </ul>
    </section>
    <section>
      <h2>Test pages</h2>
      <ul class="index-list">
        <li>
          <a href="devspace/">
            devspace
            <span class="tag">devspace</span>
            <span class="arrow">→</span>
          </a>
        </li>
        <li>
          <a href="flashfm/">
            beta
            <span class="tag">beta</span>
            <span class="arrow">→</span>
          </a>
        </li>
        <li>
          <a href="prod-eu/">
            prod-eu
            <span class="tag">prod-eu</span>
            <span class="arrow">→</span>
          </a>
        </li>
        <li>
          <a href="prod-us/">
            prod-us
            <span class="tag">prod-us</span>
            <span class="arrow">→</span>
          </a>
        </li>
      </ul>
    </section>
  </div>
</body>
</html>
